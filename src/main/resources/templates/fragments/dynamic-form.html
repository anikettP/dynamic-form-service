<!-- Reusable Dynamic Form Container Fragment -->
<div th:fragment="dynamic-form-card" id="dynamic-form-card" class="gov-card mb-4 d-none">
    <div class="gov-card-header">
        <h2>Record Details</h2>
    </div>
    
    <!-- Local Alert container inside Card -->
    <div id="modal-error-alert" class="d-none"></div>

    <form id="dynamic-record-form" class="row g-3">
        <!-- Fields will be dynamically injected here -->
        <div id="dynamic-fields-container" class="row g-3 m-0 p-0"></div>

        <!-- Submit & Cancel Actions -->
        <div class="col-12 mt-4 d-flex justify-content-end gap-2">
            <button type="button" class="gov-btn gov-btn-secondary btn-cancel">Cancel</button>
            <button type="submit" class="gov-btn gov-btn-maroon">
                <i class="fa-solid fa-save me-1"></i> Save Entry
            </button>
        </div>
    </form>
</div>
