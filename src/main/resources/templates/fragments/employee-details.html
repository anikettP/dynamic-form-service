<!-- Reusable Employee Details Card Fragment -->
<div th:fragment="details-card" id="employee-details-card" class="gov-card mb-4 d-none">
    <div class="gov-card-header">
        <h2>Verified Employee Information</h2>
    </div>
    <div class="row g-3">
        <div class="col-sm-6 col-md-4">
            <span class="text-muted d-block" style="font-size: 0.75rem; text-transform: uppercase;">Force Number</span>
            <strong class="emp-force-no text-primary" style="font-size: 1.05rem;">N/A</strong>
        </div>
        <div class="col-sm-6 col-md-4">
            <span class="text-muted d-block" style="font-size: 0.75rem; text-transform: uppercase;">Employee Name</span>
            <strong class="emp-name" style="font-size: 1.05rem;">N/A</strong>
        </div>
        <div class="col-sm-6 col-md-4">
            <span class="text-muted d-block" style="font-size: 0.75rem; text-transform: uppercase;">Rank</span>
            <strong class="emp-rank" style="font-size: 1.05rem;">N/A</strong>
        </div>
        <div class="col-sm-6 col-md-4">
            <span class="text-muted d-block" style="font-size: 0.75rem; text-transform: uppercase;">Unit / Section</span>
            <strong class="emp-unit" style="font-size: 1.05rem;">N/A</strong>
        </div>
        <div class="col-sm-6 col-md-4">
            <span class="text-muted d-block" style="font-size: 0.75rem; text-transform: uppercase;">Employee ID</span>
            <strong class="emp-id" style="font-size: 1.05rem;">N/A</strong>
        </div>
        <div class="col-sm-6 col-md-4">
            <span class="text-muted d-block" style="font-size: 0.75rem; text-transform: uppercase;">Service Status</span>
            <span class="badge bg-success emp-status">ACTIVE</span>
        </div>
    </div>
</div>
