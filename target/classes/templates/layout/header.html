<!-- Reusable Government Header Fragment -->
<header th:fragment="header" class="gov-header d-flex justify-content-between align-items-center">
    <div class="gov-header-brand">
        <!-- Emblem Placeholder -->
        <div class="emblem-placeholder">
            GoI<br>Emblem
        </div>
        <!-- CRPF Logo Placeholder -->
        <div class="logo-placeholder">
            CRPF<br>Logo
        </div>
        <div class="gov-title-block">
            <h1>Central Reserve Police Force</h1>
            <span>Personnel HRMS &amp; Information Directory Portal</span>
        </div>
    </div>
    
    <div class="d-flex align-items-center gap-4">
        <!-- System Date -->
        <div class="text-end d-none d-md-block" style="font-size: 0.85rem; font-weight: 500;">
            <span class="text-muted">Portal Date:</span> 
            <span id="current-portal-date" style="color: var(--gov-primary); font-weight: bold;">June 8, 2026</span>
        </div>

        <!-- User Information & Logout -->
        <div class="d-flex align-items-center gap-3" id="header-user-section">
            <div style="font-size: 0.9rem; font-weight: 600; color: var(--gov-primary);">
                <i class="fa-solid fa-user-shield me-1"></i>
                <span id="header-username">Admin</span>
            </div>
            <button class="gov-btn gov-btn-secondary py-1 px-3" id="header-logout-btn" style="font-size: 0.8rem;">
                <i class="fa-solid fa-power-off me-1" style="color: var(--gov-danger);"></i> Logout
            </button>
        </div>
    </div>
</header>
